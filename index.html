<!DOCTYPE html>
<!-- Khai báo loại tài liệu là HTML5, giúp trình duyệt hiểu đúng chuẩn -->

<html lang="vi">
<!-- Thẻ gốc bao toàn bộ trang, lang="vi" cho biết ngôn ngữ là tiếng Việt -->

<head>
  <!-- Phần đầu: chứa thông tin meta, không hiển thị trên trang -->
  <meta charset="UTF-8">
  <title>Cấu trúc tài liệu HTML</title>
</head>

<body>
  <!-- Phần thân: chứa nội dung hiển thị cho người dùng -->

  <!-- Phần đầu trang -->
  <header>
    <h1>Cấu trúc tài liệu HTML</h1>
  </header>

  <!-- Phần nội dung -->
  <main>
    <h2>1. DOCTYPE</h2>
    <p>Khai báo loại tài liệu. Phải đặt ở dòng đầu tiên.</p>

    <h2>2. Thẻ html</h2>
    <p>Thẻ gốc bao toàn bộ nội dung của trang.</p>

    <h2>3. Thẻ head</h2>
    <p>Chứa thông tin meta như charset, title. Không hiển thị trực tiếp.</p>

    <h2>4. Thẻ body</h2>
    <p>Chứa toàn bộ nội dung hiển thị: văn bản, hình ảnh, liên kết...</p>
  </main>

</body>
</html>
